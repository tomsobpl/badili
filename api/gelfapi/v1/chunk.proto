syntax = "proto3";

package gelfapi.v1;
option go_package = "github.com/tomsobpl/badili/api/gelfapi/v1;gelfapi";

service ChunkService {
  rpc StreamChunkBatch(stream ChunkBatch) returns (ChunkBatchSummary) {}
}

message Chunk {
  string message_id = 1;
  int32 sequence_num = 2;   // 'int' in Go is usually 32 or 64 bit; int32 is standard for sequence
  int32 sequence_count = 3;
  bytes payload = 4;        // Direct mapping for []byte
  int64 timestamp = 5;
}

message ChunkBatch {
  repeated Chunk chunks = 1;
}

message ChunkBatchSummary {
  int64 total_chunks_received = 1;
}
